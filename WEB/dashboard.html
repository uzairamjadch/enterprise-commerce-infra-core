<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Core — Telemetry Engine</title>
  <style>
    :root {
      --bg-slate: #030712;
      --glass-surface: rgba(17, 24, 39, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-blue: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-slate);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      padding: 20px; /* Reduced for smaller views */
    }

    @media (min-width: 768px) {
      body { padding: 40px; }
    }

    .animate-fade-down {
      opacity: 0;
      transform: translateY(-15px);
      animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .header-bar {
      display: flex;
      flex-direction: column; /* Stacked layout on mobile */
      gap: 16px;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    @media (min-width: 540px) {
      .header-bar { flex-direction: row; align-items: center; }
    }

    .header-bar h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    @media (min-width: 768px) { .header-bar h1 { font-size: 28px; } }

    .back-btn {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      padding: 10px 16px;
      border-radius: 8px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.3s ease;
    }
    .back-btn:hover { border-color: var(--accent-blue); }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr; /* Single column responsive grid */
      gap: 16px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @media (min-width: 640px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
      .metrics-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
    }

    .metric-card {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 20px;
      border-radius: 12px;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }

    .metric-card label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
    @media (min-width: 768px) {
      .metric-card { padding: 24px; }
      .metric-card label { font-size: 13px; }
      .metric-card .value { font-size: 32px; }
    }

    .log-panel {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .log-panel h2 { font-size: 16px; margin-bottom: 12px; }
    @media (min-width: 768px) { .log-panel h2 { font-size: 18px; margin-bottom: 16px; } }

    /* Prevents table structure breakdown on phone devices */
    .table-responsive-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 600px; /* Forces soft custom horizontal viewport scroll within table if on tiny screens */
    }

    .log-table th, .log-table td { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
    .log-table th { color: var(--text-muted); font-weight: 500; }
    .log-row-animate { animation: rowSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .status-tag { color: #10b981; font-weight: 600; }

    @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div class="header-bar animate-fade-down">
    <h1>Live Telemetry Stream</h1>
    <a href="../index.html" class="back-btn">← Gateway Platform</a>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <label>System Throughput</label>
      <div class="value" id="throughput-val">Syncing...</div>
    </div>
    <div class="metric-card">
      <label>Active Tenant Layers</label>
      <div class="value" id="tenants-val">Syncing...</div>
    </div>
    <div class="metric-card">
      <label>Average Cluster Latency</label>
      <div class="value" id="latency-val">Syncing...</div>
    </div>
  </div>

  <div class="log-panel">
    <h2>Cluster Event Feed</h2>
    <div class="table-responsive-wrapper">
      <table class="log-table">
        <thead>
          <tr>
            <th>Tenant Context</th>
            <th>Requested Path</th>
            <th>Runtime Metadata</th>
            <th>Health Status</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="4" style="color: var(--text-muted);">Awaiting telemetry sync...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function streamTelemetry() {
      try {
        const response = await fetch('http://localhost:5000/api/v1/analytics/overview');
        const payload = await response.json();
        
        if (payload.status === "success") {
          document.getElementById('throughput-val').innerText = payload.data.systemThroughput;
          document.getElementById('tenants-val').innerText = payload.data.activeTenants;
          document.getElementById('latency-val').innerText = payload.data.avgLatency;

          let tableContent = '';
          payload.data.logs.forEach((log, index) => {
            tableContent += `
              <tr class="log-row-animate" style="animation-delay: ${index * 0.05}s">
                <td><strong>${log.tenant}</strong></td>
                <td style="font-family: monospace;">${log.route}</td>
                <td>${log.detail}</td>
                <td><span class="status-tag">${log.status}</span></td>
              </tr>`;
          });
          document.getElementById('log-body').innerHTML = tableContent;
        }
      } catch (err) {
        console.error("Pipeline breakdown tracking metrics:", err);
      }
    }

    setInterval(streamTelemetry, 1500);
    streamTelemetry();
  </script>
</body>
</html>
