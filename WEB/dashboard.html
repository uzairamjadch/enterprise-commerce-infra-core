<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Core — Telemetry Engine</title>
  <style>
    :root {
      --bg-slate: #030712;
      --glass-surface: rgba(17, 24, 39, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-blue: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-slate);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      padding: 40px;
    }

    .animate-fade-down {
      opacity: 0;
      transform: translateY(-15px);
      animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .header-bar h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .back-btn {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      padding: 10px 20px;
      border-radius: 8px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .back-btn:hover { 
      border-color: var(--accent-blue);
      transform: translateX(-4px);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .metric-card {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 24px;
      border-radius: 12px;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }

    .metric-card:hover {
      border-color: rgba(59, 130, 246, 0.4);
      transform: translateY(-2px);
    }

    .metric-card label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-card .value {
      font-size: 32px;
      font-weight: 700;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    .log-panel {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .log-panel h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .log-table th, .log-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--glass-border);
      font-size: 14px;
    }

    .log-table th { color: var(--text-muted); font-weight: 500; }
    
    .log-row-animate {
      animation: rowSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .status-tag { color: #10b981; font-weight: 600; }

    @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes rowSlideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="header-bar animate-fade-down">
    <h1>Live Telemetry Stream</h1>
    <a href="../index.html" class="back-btn">← Gateway Platform</a>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <label>System Throughput</label>
      <div class="value" id="throughput-val">Syncing...</div>
    </div>
    <div class="metric-card">
      <label>Active Tenant Layers</label>
      <div class="value" id="tenants-val">Syncing...</div>
    </div>
    <div class="metric-card">
      <label>Average Cluster Latency</label>
      <div class="value" id="latency-val">Syncing...</div>
    </div>
  </div>

  <div class="log-panel">
    <h2>Cluster Event Feed</h2>
    <table class="log-table">
      <thead>
        <tr>
          <th>Tenant Context</th>
          <th>Requested Path</th>
          <th>Runtime Metadata</th>
          <th>Health Status</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="4" style="color: var(--text-muted);">Awaiting telemetry sync...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function streamTelemetry() {
      try {
        const response = await fetch('http://localhost:5000/api/v1/analytics/overview');
        const payload = await response.json();
        
        if (payload.status === "success") {
          document.getElementById('throughput-val').innerText = payload.data.systemThroughput;
          document.getElementById('tenants-val').innerText = payload.data.activeTenants;
          document.getElementById('latency-val').innerText = payload.data.avgLatency;

          let tableContent = '';
          payload.data.logs.forEach((log, index) => {
            tableContent += `
              <tr class="log-row-animate" style="animation-delay: ${index * 0.05}s">
                <td><strong>${log.tenant}</strong></td>
                <td style="font-family: monospace;">${log.route}</td>
                <td>${log.detail}</td>
                <td><span class="status-tag">${log.status}</span></td>
              </tr>`;
          });
          document.getElementById('log-body').innerHTML = tableContent;
        }
      } catch (err) {
        console.error("Pipeline breakdown tracking metrics:", err);
      }
    }

    setInterval(streamTelemetry, 1500);
    streamTelemetry();
  </script>
</body>
</html>
