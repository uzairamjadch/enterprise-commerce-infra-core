<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Core — Cluster Topology</title>
  <style>
    :root {
      --bg-slate: #030712;
      --glass-surface: rgba(17, 24, 39, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-blue: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-slate);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      padding: 40px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(-10px);
      animation: baseFade 0.5s ease forwards;
    }

    .header-bar h1 { font-size: 28px; letter-spacing: -0.5px; }
    .back-btn {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      padding: 10px 20px;
      border-radius: 8px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 14px;
    }
    .back-btn:hover { border-color: var(--accent-blue); }

    .topology-map {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      opacity: 0;
      transform: scale(0.98);
      animation: mapScaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .node {
      background: rgba(31, 41, 55, 0.6);
      border: 1px solid var(--glass-border);
      padding: 16px 32px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .node.primary { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59,130,246,0.2); }
    .node:hover { transform: scale(1.03); border-color: var(--accent-blue); }
    .connector-line { width: 2px; height: 30px; background: var(--glass-border); }
    .children-row { display: flex; gap: 32px; }

    @keyframes baseFade { to { opacity: 1; transform: translateY(0); } }
    @keyframes mapScaleUp { to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="header-bar">
    <h1>Cluster Architecture Topology</h1>
    <a href="index.html" class="back-btn">← Gateway Platform</a>
  </div>

  <div class="topology-map">
    <div class="node primary">Load Balancer Edge Gateway</div>
    <div class="connector-line"></div>
    <div class="node">API Core Orchestrator (Port 5000)</div>
    <div class="connector-line"></div>
    <div class="children-row">
      <div class="node">Database Cluster Node 01</div>
      <div class="node">In-Memory Cache Cluster</div>
      <div class="node">File Store Bucket</div>
    </div>
  </div>
</body>
</html>
